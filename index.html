<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // GitHub Pages SPA redirect: restore path from query string
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <title>Organizing by Design | Custom Millwork & Closets</title>
    <meta name="description" content="Bespoke custom closets, kitchens, wall beds, mudrooms and home offices. Lifetime guarantee on all millwork. Serving the GTA." />
    <meta property="og:title" content="Organizing by Design | Custom Millwork & Closets" />
    <meta property="og:description" content="Bespoke custom closets, kitchens, wall beds, mudrooms and home offices. Serving the GTA." />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
